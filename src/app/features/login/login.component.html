<div class="login-shell">

  <!-- Left panel: brand art -->
  <div class="left-panel">
    <div class="geo-ring geo-ring-1"></div>
    <div class="geo-ring geo-ring-2"></div>
    <div class="geo-ring geo-ring-3"></div>
    <div class="geo-dot geo-dot-1"></div>
    <div class="geo-dot geo-dot-2"></div>

    <div class="left-inner">
      <div class="brand-mark">
        <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
          <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
          <line x1="12" y1="12" x2="12" y2="16"/>
          <line x1="10" y1="14" x2="14" y2="14"/>
        </svg>
      </div>

      <h1 class="left-title">Amira<br/><span class="left-title-accent">ERP</span></h1>
      <p class="left-desc">Complete business management — inventory, sales, purchases & analytics in one place.</p>

      <div class="stats-row">
        <div class="stat-chip">
          <span class="stat-num">2.4k+</span>
          <span class="stat-lbl">Products</span>
        </div>
        <div class="stat-chip">
          <span class="stat-num">98%</span>
          <span class="stat-lbl">Accuracy</span>
        </div>
        <div class="stat-chip">
          <span class="stat-num">Real‑time</span>
          <span class="stat-lbl">Sync</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Right panel: form -->
  <div class="right-panel">
    <div class="form-wrap">

      <div class="form-top">
        <div class="step-label">SECURE ACCESS</div>
        <h2 class="form-title">Sign in</h2>
        <p class="form-sub">Enter your credentials to continue</p>
      </div>

      <form (ngSubmit)="login()" class="login-form">

        <div class="field">
          <label for="username">{{ 'login.username' | translate }}</label>
          <div class="input-wrap">
            <svg class="input-icon" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input id="username" type="text" [(ngModel)]="username" name="username"
              [placeholder]="'login.username_placeholder' | translate" autocomplete="username" />
          </div>
        </div>

        <div class="field">
          <label for="password">{{ 'login.password' | translate }}</label>
          <div class="input-wrap">
            <svg class="input-icon" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input id="password" type="password" [(ngModel)]="password" name="password"
              [placeholder]="'login.password_placeholder' | translate" autocomplete="current-password" />
          </div>
        </div>

        <div class="error-msg" *ngIf="errorMsg">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          {{ errorMsg }}
        </div>

        <button type="submit" class="login-btn" [disabled]="loading">
          <span *ngIf="loading" class="spinner"></span>
          {{ loading ? ('login.signing_in' | translate) : ('login.sign_in' | translate) }}
          <svg *ngIf="!loading" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>

      </form>

      <div class="form-divider"><span>or</span></div>
      <button class="lang-btn" (click)="lang.toggle()">🌐 {{ 'lang.toggle' | translate }}</button>

    </div>
  </div>

</div>
